name: Supabase DB Push

on:
  push:
    branches:
      - main

jobs:
  database-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push database changes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db push

      - name: Safety Guard
        if: "contains(github.event.head_commit.message, 'DROP TABLE') || contains(github.event.head_commit.message, 'DROP SCHEMA') || contains(github.event.head_commit.message, 'TRUNCATE')"
        run: |
          echo "DANGER: Potentially destructive migration detected. Manual review required."
          exit 1
