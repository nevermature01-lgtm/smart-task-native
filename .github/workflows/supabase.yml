name: Supabase Schema Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  schema-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Dump remote schema (read only)
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db dump --linked --schema public > supabase/schema.sql

      - name: Commit schema changes
        run: |
          git config --global user.name "AI Schema Bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add supabase/schema.sql
          git commit -m "auto: update remote schema snapshot" || echo "No changes"
          git push
