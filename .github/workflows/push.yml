name: CI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: |
          supabase link --project-ref nvbuasitqlsrzjiyzagn --password $SUPABASE_DB_PASSWORD

      - name: Pull Supabase database schema
        run: |
          supabase db pull --linked --password $SUPABASE_DB_PASSWORD

      - name: Push Supabase database changes
        run: |
          supabase db push --linked --password $SUPABASE_DB_PASSWORD
